name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
      - 'nginx.conf'
      - '.github/workflows/**'
  workflow_dispatch:        # manual "redeploy" button in the Actions tab

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-24.04-arm     # native arm64 — no QEMU emulation
    permissions:
      contents: read
      packages: write
    outputs:
      image_repo: ${{ steps.vars.outputs.image_repo }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_repo=ghcr.io/${OWNER}/byteyourfork" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.vars.outputs.image_repo }}-backend:latest
            ${{ steps.vars.outputs.image_repo }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.vars.outputs.image_repo }}-frontend:latest
            ${{ steps.vars.outputs.image_repo }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_REPO: ${{ needs.build-and-push.outputs.image_repo }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: IMAGE_REPO,IMAGE_TAG
          script: |
            set -e
            cd ~/ByteYourFork
            git pull origin main
            export IMAGE_REPO IMAGE_TAG
            docker compose pull
            docker compose run --rm backend node migrate.js
            docker compose up -d --remove-orphans
            docker image prune -f
