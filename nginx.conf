server {
    listen 80;
    listen [::]:80;
    server_name byteyourfork.com www.byteyourfork.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name byteyourfork.com www.byteyourfork.com;

    ssl_certificate /etc/letsencrypt/live/byteyourfork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/byteyourfork.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        root /home/ubuntu/ByteYourFork/frontend/dist;
        try_files $uri /index.html;
    }
}
