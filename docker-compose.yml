services:
  postgres:
    image: postgres:16-alpine
    container_name: byteyourfork-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_REPO}-backend:${IMAGE_TAG:-latest}
    build: ./backend
    container_name: byteyourfork-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    image: ${IMAGE_REPO}-frontend:${IMAGE_TAG:-latest}
    build: ./frontend
    container_name: byteyourfork-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

volumes:
  postgres_data:
